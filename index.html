<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>獵戶座任務：溯尋本源</title>
    <style>
        body { margin: 0; background: #05080a; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #game-ui { position: absolute; top: 8%; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .stat { font-size: 20px; font-weight: bold; text-shadow: 0 0 10px #2ecc71; margin: 3px; }
        #score { color: #f1c40f; font-size: 36px; }
        #bonus-msg { font-size: 14px; color: #2ecc71; opacity: 0.8; }
        canvas { display: block; }
        .controls { position: absolute; bottom: 0; width: 100%; height: 160px; display: flex; background: rgba(0,0,0,0.8); padding-bottom: env(safe-area-inset-bottom); border-top: 2px solid #2ecc71; }
        .btn { flex: 1; margin: 15px; border-radius: 20px; border: 2px solid #2ecc71; background: rgba(46, 204, 113, 0.1); color: white; font-size: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .btn:active { background: #2ecc71; transform: scale(0.95); }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 30px; text-align: center; }
        #start-btn { margin-top: 20px; padding: 15px 60px; background: #f1c40f; border: none; border-radius: 50px; font-size: 24px; font-weight: bold; box-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        #treasure-txt { font-size: 40px; color: #fff; text-shadow: 0 0 20px #f1c40f; margin-top: 20px; display:none; }
    </style>
</head>
<body>

<div id="game-ui">
    <div class="stat">分數: <span id="score">0</span></div>
    <div id="bonus-msg">當前球值: 50</div>
    <div class="stat">剩餘時間: <span id="timer">30</span>s</div>
</div>

<canvas id="canvas"></canvas>

<div class="controls">
    <div class="btn" id="btn-0">左</div>
    <div class="btn" id="btn-1">中</div>
    <div class="btn" id="btn-2">右</div>
</div>

<div id="overlay">
    <h1 id="m-title" style="color:#2ecc71">索拉卡斯遺蹟：第二階段</h1>
    <p id="m-desc">邪惡能量已進入靜止狀態。<br>按錯按鈕會導致能量反噬（扣分）。<br>連續淨化 40 顆以上能量以達成目標。<br><br><b>挑戰目標：10,000 分</b></p>
    <button id="start-btn">開啟淨化音效並啟動</button>
    <div id="treasure-txt">溯 尋 本 源</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const timerEl = document.getElementById('timer');
const bonusEl = document.getElementById('bonus-msg');
const overlay = document.getElementById('overlay');
const treasureTxt = document.getElementById('treasure-txt');

let score = 0, timeLeft = 30, gameActive = false, ballsCleared = 0;
let balls = []; // 永遠維持 6 顆
let particles = [];
let laneWidth, ballSize, targetY;

// 音效引擎
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playSound(freq, type, duration, vol) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq/2, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    laneWidth = canvas.width / 3;
    ballSize = Math.min(laneWidth * 0.6, 90);
    targetY = canvas.height - 260;
}
window.addEventListener('resize', resize);
resize();

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 15;
        this.vy = (Math.random() - 0.5) * 15;
        this.alpha = 1;
        this.color = color;
    }
    update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.03; }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

function getBallValue() {
    if (ballsCleared < 20) return 50;
    if (ballsCleared < 40) return 100;
    return 150;
}

function createBall() {
    const lane = Math.floor(Math.random() * 3);
    const hue = (ballsCleared * 5) % 360; // 顏色隨進度改變
    return {
        lane: lane,
        currentY: -100,
        color: `hsl(${hue}, 80%, 50%)`
    };
}

function fillQueue() {
    while (balls.length < 6) {
        balls.push(createBall());
    }
}

function handleInput(lane) {
    if (!gameActive || balls.length === 0) return;

    const val = getBallValue();
    if (balls[0].lane === lane) {
        // 成功
        score += val;
        ballsCleared++;
        playSound(800, 'sine', 0.2, 0.3); // 高頻淨化音
        for(let i=0; i<25; i++) particles.push(new Particle(lane * laneWidth + laneWidth/2, targetY, "#fff"));
        balls.shift();
        fillQueue();
    } else {
        // 失敗
        score = Math.max(0, score - val);
        playSound(150, 'sawtooth', 0.3, 0.2); // 低音打擊感
        ctx.fillStyle = "rgba(255, 0, 0, 0.4)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    scoreEl.innerText = score;
    bonusEl.innerText = `當前球值: ${getBallValue()} (已淨化: ${ballsCleared})`;
}

function update() {
    if (!gameActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 背景線
    ctx.strokeStyle = "rgba(46, 204, 113, 0.15)";
    ctx.lineWidth = 3;
    for(let i=1; i<3; i++) {
        ctx.beginPath(); ctx.moveTo(i * laneWidth, 0); ctx.lineTo(i * laneWidth, canvas.height); ctx.stroke();
    }

    // 繪製固定位置的 6 顆球
    balls.forEach((b, index) => {
        let destY = targetY - (index * (ballSize + 25));
        // 平滑移動感
        if (b.currentY === -100) b.currentY = destY - 100; // 初次生成的掉落感
        b.currentY += (destY - b.currentY) * 0.2;

        ctx.save();
        if (index === 0) { // 當前目標發光
            ctx.shadowBlur = 40;
            ctx.shadowColor = "#fff";
            ctx.strokeStyle = "white";
            ctx.lineWidth = 6;
            ctx.strokeRect(b.lane * laneWidth + 15, b.currentY - ballSize/2 - 10, laneWidth - 30, ballSize + 20);
        }
        
        let grad = ctx.createRadialGradient(b.lane * laneWidth + laneWidth/2, b.currentY, 0, b.lane * laneWidth + laneWidth/2, b.currentY, ballSize/2);
        grad.addColorStop(0, "white");
        grad.addColorStop(0.3, b.color);
        grad.addColorStop(1, "rgba(0,0,0,0.8)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(b.lane * laneWidth + laneWidth/2, b.currentY, ballSize/2, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    });

    particles = particles.filter(p => p.alpha > 0);
    particles.forEach(p => { p.update(); p.draw(); });

    requestAnimationFrame(update);
}

function startGame() {
    initAudio();
    score = 0; timeLeft = 30; ballsCleared = 0; balls = []; particles = [];
    fillQueue();
    gameActive = true;
    overlay.style.display = 'none';
    treasureTxt.style.display = 'none';
    scoreEl.innerText = score;
    bonusEl.innerText = `當前球值: 50 (已淨化: 0)`;
    
    let timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            endGame();
        }
    }, 1000);

    update();
}

function endGame() {
    gameActive = false;
    overlay.style.display = 'flex';
    const isWin = score >= 10000;
    document.getElementById('m-title').innerText = isWin ? "使命達成" : "淨化中斷";
    document.getElementById('m-desc').innerHTML = `最終得分: ${score}<br>總計淨化: ${ballsCleared} 顆能量`;
    document.getElementById('start-btn').innerText = "再次嘗試";
    if (isWin) {
        treasureTxt.style.display = 'block';
        playSound(440, 'sine', 1, 0.3); // 史詩結尾音
    }
}

// 事件綁定
[0, 1, 2].forEach(lane => {
    const btn = document.getElementById(`btn-${lane}`);
    const trigger = (e) => { e.preventDefault(); handleInput(lane); };
    btn.addEventListener('touchstart', trigger);
    btn.addEventListener('mousedown', trigger);
});

document.getElementById('start-btn').addEventListener('click', startGame);
</script>
</body>
</html>
