<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>獵戶座任務：極光淨化</title>
    <style>
        body { margin: 0; background: #05080a; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #game-ui { position: absolute; top: 10%; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .stat { font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #2ecc71; margin: 5px; }
        #score { color: #f1c40f; font-size: 32px; }
        canvas { display: block; }
        .controls { position: absolute; bottom: 0; width: 100%; height: 160px; display: flex; background: rgba(0,0,0,0.5); padding-bottom: env(safe-area-inset-bottom); }
        .btn { flex: 1; margin: 15px; border-radius: 20px; border: 2px solid #2ecc71; background: rgba(46, 204, 113, 0.2); color: white; font-size: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .btn:active { background: #2ecc71; transform: scale(0.95); }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 30px; text-align: center; }
        #start-btn { margin-top: 20px; padding: 15px 50px; background: #f1c40f; border: none; border-radius: 50px; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-ui">
    <div class="stat">得分: <span id="score">0</span></div>
    <div class="stat">剩餘時間: <span id="timer">30</span>s</div>
</div>

<canvas id="canvas"></canvas>

<div class="controls">
    <div class="btn" id="btn-0">左</div>
    <div class="btn" id="btn-1">中</div>
    <div class="btn" id="btn-2">右</div>
</div>

<div id="overlay">
    <h1 id="m-title">索拉卡斯遺蹟</h1>
    <p id="m-desc">只有最下方的能量可以被淨化！<br>按錯按鈕將導致能量反噬（扣分）。<br><br><b>目標：10,000 分</b></p>
    <button id="start-btn">開始行動</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const timerEl = document.getElementById('timer');
const overlay = document.getElementById('overlay');

let score = 0, timeLeft = 30, gameActive = false;
let balls = []; // 存放所有排隊的能量球
let particles = []; // 噴發粒子
let laneWidth, ballSize, targetY;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    laneWidth = canvas.width / 3;
    ballSize = laneWidth * 0.5;
    targetY = canvas.height - 240;
}
window.addEventListener('resize', resize);
resize();

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.alpha = 1;
        this.color = color;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.alpha -= 0.02;
    }
    draw() {
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
        ctx.fill();
    }
}

function spawnBall() {
    if (balls.length < 8) {
        balls.push({
            lane: Math.floor(Math.random() * 3),
            y: -100,
            currentY: -100,
            color: `hsl(${280 + Math.random()*40}, 70%, 50%)`
        });
    }
}

function handleInput(lane) {
    if (!gameActive || balls.length === 0) return;

    const targetBall = balls[0]; // 永遠只檢查最下面那一個
    if (targetBall.lane === lane) {
        // 成功消除
        score += 1000;
        // 觸發光明噴發特效
        for(let i=0; i<20; i++) particles.push(new Particle(lane * laneWidth + laneWidth/2, targetY, "#fff"));
        for(let i=0; i<15; i++) particles.push(new Particle(lane * laneWidth + laneWidth/2, targetY, "#f1c40f"));
        balls.shift();
    } else {
        // 扣分懲罰
        score = Math.max(0, score - 1000);
        ctx.fillStyle = "rgba(255, 0, 0, 0.3)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    scoreEl.innerText = score;
}

function update() {
    if (!gameActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 繪製背景軌道
    ctx.strokeStyle = "rgba(46, 204, 113, 0.1)";
    for(let i=1; i<3; i++) {
        ctx.beginPath(); ctx.moveTo(i * laneWidth, 0); ctx.lineTo(i * laneWidth, canvas.height); ctx.stroke();
    }

    // 更新能量球位置
    balls.forEach((b, index) => {
        let destY = targetY - (index * (ballSize + 20));
        if (b.currentY < destY) b.currentY += 25;
        else b.currentY = destY;

        // 繪製球體
        ctx.save();
        if (index === 0) { // 最下面的目標發光
            ctx.shadowBlur = 30;
            ctx.shadowColor = "#fff";
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 4;
            ctx.strokeRect(b.lane * laneWidth + 10, b.currentY - ballSize/2 - 10, laneWidth - 20, ballSize + 20);
        }
        
        // 邪惡能量核心
        let grad = ctx.createRadialGradient(b.lane * laneWidth + laneWidth/2, b.currentY, 5, b.lane * laneWidth + laneWidth/2, b.currentY, ballSize/2);
        grad.addColorStop(0, "white");
        grad.addColorStop(0.2, b.color);
        grad.addColorStop(1, "black");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(b.lane * laneWidth + laneWidth/2, b.currentY, ballSize/2, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    });

    // 粒子系統
    particles = particles.filter(p => p.alpha > 0);
    particles.forEach(p => { p.update(); p.draw(); });

    requestAnimationFrame(update);
}

function startGame() {
    score = 0; timeLeft = 30; balls = []; particles = [];
    gameActive = true;
    overlay.style.display = 'none';
    scoreEl.innerText = score;
    
    let timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            gameActive = false;
            overlay.style.display = 'flex';
            document.getElementById('m-title').innerText = score >= 10000 ? "任務成功" : "任務失敗";
            document.getElementById('m-desc').innerText = `最終得分: ${score}`;
            document.getElementById('start-btn').innerText = "再次挑戰";
        }
    }, 1000);

    // 持續生成能量球
    let spawnInterval = setInterval(() => {
        if (!gameActive) { clearInterval(spawnInterval); return; }
        spawnBall();
    }, 400);

    update();
}

// 綁定事件
[0, 1, 2].forEach(lane => {
    const btn = document.getElementById(`btn-${lane}`);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(lane); });
    btn.addEventListener('mousedown', (e) => { e.preventDefault(); handleInput(lane); });
});

document.getElementById('start-btn').addEventListener('click', startGame);
</script>
</body>
</html>
